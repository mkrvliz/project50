<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#F1F1EF;
    --panel:#FFFFFF;
    --line:#E0E0E4;
    --bone:#1B1B21;
    --muted:#84848F;
    --gold:#B5822E;
    --violet:#6C5FC7;
    --r:3px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--ink);
    color:var(--bone);
    font-family:'Manrope',system-ui,sans-serif;
    padding:32px 20px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto}

  /* header */
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;
  }
  h1{
    font-family:'Unbounded','Manrope',sans-serif;
    font-weight:600;font-size:clamp(30px,6vw,46px);
    line-height:1.02;letter-spacing:-.02em;margin-bottom:26px;
  }
  h1 em{font-style:normal;color:var(--gold)}

  .meter{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .meter .big{
    font-family:'Unbounded',sans-serif;font-size:34px;font-weight:600;
    line-height:1;color:var(--gold);
  }
  .meter .lbl{font-size:13px;color:var(--muted)}
  .bar{height:2px;background:var(--line);position:relative;margin-bottom:34px}
  .bar span{position:absolute;inset:0 auto 0 0;background:var(--gold);width:0;transition:width .5s ease}

  /* day panel */
  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:22px 20px;margin-bottom:34px;
  }
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .panel-head h2{
    font-family:'Unbounded',sans-serif;font-size:15px;font-weight:400;letter-spacing:.01em;
  }
  .daytag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em}
  .daytag b{color:var(--violet);font-weight:500}

  .task{
    display:flex;align-items:center;gap:13px;padding:11px 0;
    border-top:1px solid var(--line);cursor:pointer;user-select:none;
  }
  .task:first-of-type{border-top:none}
  .box{
    width:17px;height:17px;flex:none;border:1px solid #C6C6CE;border-radius:2px;
    position:relative;transition:.16s;
  }
  .box::after{
    content:"";position:absolute;left:5px;top:1px;width:4px;height:9px;
    border:solid var(--ink);border-width:0 2px 2px 0;transform:rotate(45deg) scale(.4);
    opacity:0;transition:.16s;
  }
  .task.on .box{background:var(--gold);border-color:var(--gold)}
  .task.on .box::after{opacity:1;transform:rotate(45deg) scale(1)}
  .task span{font-size:15px;transition:.16s}
  .task.on span{color:var(--muted);text-decoration:line-through;text-decoration-color:#C0C0C8}
  .task:hover .box{border-color:var(--gold)}

  textarea{
    width:100%;margin-top:16px;background:transparent;border:1px solid var(--line);
    border-radius:var(--r);color:var(--bone);font-family:'Manrope',sans-serif;font-size:14px;
    padding:11px 12px;resize:vertical;min-height:64px;line-height:1.5;
  }
  textarea:focus{outline:none;border-color:var(--violet)}
  textarea::placeholder{color:#A0A0AA}

  /* grid */
  .section-label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-bottom:14px;
  }
  .grid{
    display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:12px;
  }
  @media(max-width:560px){.grid{grid-template-columns:repeat(5,1fr);gap:5px}}
  .cell{
    aspect-ratio:1;background:#FAFAFA;border:1px solid var(--line);border-radius:2px;
    display:flex;gap:1px;padding:3px;cursor:pointer;transition:.14s;
  }
  .cell:hover{border-color:#B5B5BE}
  .cell.sel{border-color:var(--violet)}
  .cell.future{opacity:.35;cursor:default}
  .cell.full{background:rgba(181,130,46,.10);border-color:rgba(181,130,46,.55)}
  .seg{flex:1;background:#E3E3E7;border-radius:1px;transition:.2s}
  .seg.on{background:var(--gold)}
  .legend{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:34px}

  /* stats */
  .stat{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .stat:first-of-type{border-top:none}
  .stat .name{flex:1;font-size:14px}
  .stat .track{width:96px;height:2px;background:var(--line);flex:none;position:relative}
  .stat .track i{position:absolute;inset:0 auto 0 0;background:var(--violet);width:0;transition:width .5s ease}
  .stat .pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:38px;text-align:right;flex:none}

  footer{margin-top:36px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .note{font-size:12px;color:var(--muted);line-height:1.6}
  button.reset{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;
    padding:8px 12px;border-radius:var(--r);cursor:pointer;transition:.16s;
  }
  button.reset:hover{border-color:#B0554B;color:#A3453B}
  .loading{color:var(--muted);font-size:14px;padding:40px 0}
  :focus-visible{outline:2px solid var(--violet);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="wrap">
  <div class="eyebrow">Project 50 · дневной трекер</div>
  <h1>Пятьдесят дней,<br>шесть <em>привычек</em>.</h1>

  <div id="app"><div class="loading">Загружаю прогресс…</div></div>
</div>

<script>
const TASKS = [
  "Подъём до 8:00",
  "30 минут утра без телефона",
  "Тренировка 45+ минут",
  "10 страниц чтения",
  "План питания",
  "Запись в дневник"
];
const KEY = "project50";
let state = null;      // {start:"YYYY-MM-DD", days:{date:[0/1 x6]}, notes:{date:str}}
let selected = null;

const iso = d => d.toISOString().slice(0,10);
const today = () => iso(new Date());
const addDays = (isoStr,n) => { const d=new Date(isoStr+"T12:00:00"); d.setDate(d.getDate()+n); return iso(d); };
const daysBetween = (a,b) => Math.round((new Date(b+"T12:00:00") - new Date(a+"T12:00:00"))/864e5);
const fmt = s => new Date(s+"T12:00:00").toLocaleDateString("ru-RU",{day:"numeric",month:"long"});

async function load(){
  try{
    const r = await window.storage.get(KEY);
    state = JSON.parse(r.value);
  }catch(e){
    state = { start: today(), days:{}, notes:{} };
    await save();
  }
  if(!state.days) state.days={};
  if(!state.notes) state.notes={};
  selected = today();
  render();
}
async function save(){
  try{ await window.storage.set(KEY, JSON.stringify(state)); }
  catch(e){ console.error("Не удалось сохранить:", e); }
}

const marks = d => state.days[d] || [0,0,0,0,0,0];
const isFull = d => marks(d).every(v=>v===1);

function render(){
  const elapsed = Math.max(daysBetween(state.start, today()) + 1, 1);
  const counted = Object.keys(state.days).filter(isFull).length;
  const slots = Math.max(50, elapsed);

  // stats per task, по прошедшим дням
  const stats = TASKS.map((_,i)=>{
    let hit=0;
    for(let k=0;k<elapsed;k++){ if(marks(addDays(state.start,k))[i]) hit++; }
    return Math.round(hit/elapsed*100);
  });

  const m = marks(selected);
  const dayNo = daysBetween(state.start, selected) + 1;

  document.getElementById("app").innerHTML = `
    <div class="meter">
      <div class="big">${counted}<span style="color:var(--muted);font-size:20px">/50</span></div>
      <div class="lbl">засчитанных дней · идёт ${elapsed}-й день челленджа</div>
    </div>
    <div class="bar"><span style="width:${counted/50*100}%"></span></div>

    <div class="panel">
      <div class="panel-head">
        <h2>${selected===today() ? "Сегодня" : fmt(selected)}</h2>
        <div class="daytag">ДЕНЬ <b>${dayNo}</b> · ${m.filter(Boolean).length}/6</div>
      </div>
      ${TASKS.map((t,i)=>`
        <div class="task ${m[i]?"on":""}" data-i="${i}" tabindex="0" role="checkbox" aria-checked="${!!m[i]}">
          <div class="box"></div><span>${t}</span>
        </div>`).join("")}
      <textarea id="note" placeholder="Дневник: как прошёл день, что мешало, что сработало">${state.notes[selected]||""}</textarea>
    </div>

    <div class="section-label">Полотно · 6 полос = 6 привычек</div>
    <div class="grid">
      ${Array.from({length:slots},(_,k)=>{
        const d = addDays(state.start,k);
        const future = daysBetween(d, today()) < 0;
        const mm = marks(d);
        return `<div class="cell ${future?"future":""} ${isFull(d)?"full":""} ${d===selected?"sel":""}"
                     data-d="${d}" title="${fmt(d)} — ${mm.filter(Boolean).length}/6">
          ${mm.map(v=>`<div class="seg ${v?"on":""}"></div>`).join("")}
        </div>`;
      }).join("")}
    </div>
    <div class="legend">Клетка целиком золотая — день засчитан. Просевшая полоса, повторяющаяся из клетки в клетку, — это и есть привычка, которая не приживается. Клетку можно открыть и отметить задним числом.</div>

    <div class="section-label">Что проседает</div>
    ${TASKS.map((t,i)=>`
      <div class="stat">
        <div class="name">${t}</div>
        <div class="track"><i style="width:${stats[i]}%"></i></div>
        <div class="pct">${stats[i]}%</div>
      </div>`).join("")}

    <footer>
      <div class="note">Пропуск не обнуляет счёт: день просто не засчитывается,<br>идём до 50 закрытых дней.</div>
      <button class="reset" id="reset">НАЧАТЬ ЗАНОВО</button>
    </footer>
  `;

  document.querySelectorAll(".task").forEach(el=>{
    const toggle = () => {
      const i = +el.dataset.i;
      const cur = marks(selected).slice();
      cur[i] = cur[i] ? 0 : 1;
      state.days[selected] = cur;
      save(); render();
    };
    el.onclick = toggle;
    el.onkeydown = e => { if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggle(); } };
  });

  document.querySelectorAll(".cell:not(.future)").forEach(el=>{
    el.onclick = () => { selected = el.dataset.d; render(); };
  });

  const note = document.getElementById("note");
  let t;
  note.oninput = () => {
    clearTimeout(t);
    t = setTimeout(()=>{ state.notes[selected] = note.value; save(); }, 500);
  };

  document.getElementById("reset").onclick = async () => {
    if(!confirm("Стереть весь прогресс и начать челлендж с сегодняшнего дня?")) return;
    state = { start: today(), days:{}, notes:{} };
    selected = today();
    await save(); render();
  };
}

load();
</script>
